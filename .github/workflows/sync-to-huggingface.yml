name: Sync to Hugging Face Space

on:
  push:
    branches: [main, master]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add space https://huggingface.co/spaces/QWAtro/afk-mc
          git push --force https://$HF_TOKEN@huggingface.co/spaces/QWAtro/afk-mc main
          
